name: PR - Lint and Test

permissions: {}

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            cli.codecov.io:443
            files.pythonhosted.org:443
            github.com:443
            ingest.codecov.io:443
            keybase.io:443
            o26192.ingest.us.sentry.io:443
            pypi.org:443
            release-assets.githubusercontent.com:443
            schema.ocsf.io:443
            storage.googleapis.com:443
            raw.githubusercontent.com:443
            releases.astral.sh:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install poetry
        run: |
          python -m pip install --upgrade pip
          pipx install poetry

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"

      - name: Install dependencies
        run: |
          poetry install
          poetry run pip install --upgrade pip
          poetry run pip list

      - name: Poetry check
        run: |
          poetry check --lock

      - name: Lint with flake8
        run: |
          poetry run flake8 . --ignore=E501,W503

      - name: Lint with ruff
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3.6.1

      - name: Checking format with black
        run: |
          poetry run black --check .

      - name: Lint with pylint
        run: |
          poetry run pylint --disable=W,C,R,E -j 0 -rn -sn py_ocsf_models/

      - name: Check types with mypy
        run: |
          poetry run mypy --strict py_ocsf_models/

      - name: Bandit
        run: |
          poetry run bandit -q -lll -x './tests' -r .

      - name: Vulture
        run: |
          poetry run vulture --min-confidence 100 .

      - name: Test with pytest
        run: |
          poetry run pytest -n auto --cov=./py_ocsf_models --cov-report=xml tests

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          slug: prowler-cloud/py-ocsf-models

  osv-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # osv-scanner action posts/updates a PR comment with findings

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.deps.dev:443
            api.github.com:443
            api.osv.dev:443
            github.com:443
            objects.githubusercontent.com:443
            osv-vulnerabilities.storage.googleapis.com:443
            release-assets.githubusercontent.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency vulnerability scan with osv-scanner
        uses: ./.github/actions/osv-scanner
        with:
          lockfile: poetry.lock
